name: Redis Cache Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'master'
      - 'release-*'
  push:
    branches:
      - 'master'
      - 'beta'
      - 'release-*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
 test-redis:
    name: Test Redis Cache
    env:
      GIT_REF: ${{ github.ref }}
      GIT_SHA: ${{ github.sha }}
      POM_PATH: ./pom.xml

    runs-on: ubuntu-latest
    strategy:
        matrix:
            redis-version: [ 6 ]

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ vars.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Setup Maven
      uses: stCarolas/setup-maven@v4.5
      with:
        maven-version: ${{ vars.MAVEN_VERSION }}

    - name: Compute Maven dependency feed
      id: deps-feed
      run: |
        if [ -n "${{ vars.AZURE_MAVEN_DEPENDENCY_TO_GX }}" ]; then
          echo "url=${{ vars.AZURE_MAVEN_DEPENDENCY_TO_GX }}" >> $GITHUB_OUTPUT
          echo "server_id=azure-third-party" >> $GITHUB_OUTPUT
        else
          echo "url=https://maven.pkg.github.com/genexuslabs/Private-Maven-for-GX" >> $GITHUB_OUTPUT
          echo "server_id=github-genexuslabs" >> $GITHUB_OUTPUT
        fi

    - name: Setup Maven settings
      uses: whelk-io/maven-settings-xml-action@v14
      with:
        repositories: '[{ "id": "${{ steps.deps-feed.outputs.server_id }}", "url": "${{ steps.deps-feed.outputs.url }}",  "releases": { "enabled": "true" }, "snapshots": { "enabled": "true" } }]'
        servers: '[{ "id": "github-genexuslabs", "username": "genexusbot", "password": "${{ secrets.SECURE_TOKEN }}" }, { "id": "azure-third-party", "username": "token", "password": "${env.AZURE_ARTIFACTS_TOKEN}" }]'

    - name: Install
      if: github.repository_owner == vars.PUBLIC_MIRROR_SOURCE_ORG
      env:
        AZURE_ARTIFACTS_TOKEN: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}
      run: mvn -B install --file $POM_PATH -DskipTests

    - name: Start Redis
      uses: supercharge/redis-github-action@1.4.0
      with:
        redis-version: ${{ matrix.redis-version }}

    - name: Test
      env:
        EXECUTE_REDIS_TESTS: true
      run: mvn -B -pl gxcache-redis test --file $POM_PATH
        
